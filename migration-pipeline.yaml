name: Terraform Azure Redis Migration
trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"
  - name: sourceRedisHost
    type: string
    default: ""
  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-24.04
  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"
  - name: aksResourceGroup
    value: "cft-sbox-00-rg"
  - group: redis-migration-secrets 

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: migrate_redis_data
    pool:
      vmImage: ${{ variables.agentImage }}
    jobs:
    - job: redis_migration
      displayName: 'Migrate Redis Data to Azure Managed Redis'
      timeoutInMinutes: ${{ variables.timeoutInMinutes }}
      steps:
      - task: Bash@3
        displayName: 'Install kubelogin'
        inputs:
          targetType: 'inline'
          script: |
            echo "Installing kubelogin..."
            curl -LO https://github.com/Azure/kubelogin/releases/download/v0.1.5/kubelogin-linux-amd64.zip
            unzip kubelogin-linux-amd64.zip
            sudo mv bin/linux_amd64/kubelogin /usr/local/bin/
            sudo chmod +x /usr/local/bin/kubelogin
            kubelogin --version
      
      - task: AzureCLI@2
        displayName: 'Connect to AKS Cluster'
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Connecting to AKS cluster..."
            az aks get-credentials \
              --resource-group ${{ variables.aksResourceGroup }} \
              --name ${{ parameters.aksClusterName }} \
              --overwrite-existing
            
            echo "Converting to kubelogin..."
            kubelogin convert-kubeconfig -l azurecli
            
            echo "Verifying connection..."
            kubectl get nodes

      - task: AzureCLI@2
        displayName: Run Redis Migration in Pod
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Testing Redis connections from AKS pod..."
            kubectl run redis-test --rm -i --restart=Never \
              --image=redis:7-alpine \
              --namespace=plum \
              --command -- sh -c '
                echo "Testing source Redis connection..."
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a "$(source-redis-key)" PING
                
                echo "Testing target Redis connection..."
                redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls --user default -a "$(target-redis-key)" PING
                
                echo "Connection tests complete"
              '
