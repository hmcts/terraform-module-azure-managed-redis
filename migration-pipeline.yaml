name: Terraform Azure Redis Migration
trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"
  - name: sourceRedisHost
    type: string
    default: ""
  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-24.04
  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"
  - name: aksResourceGroup
    value: "cft-sbox-00-rg"
  - group: redis-migration-secrets 

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: check_connection
    pool:
      vmImage: ${{ variables.agentImage }}
    jobs:
    - job: redis_migration
      displayName: 'Migrate Redis Data to Azure Managed Redis'
      timeoutInMinutes: ${{ variables.timeoutInMinutes }}
      steps:
      - task: AzureCLI@2
        displayName: Run Redis Migration in Pod
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
                echo "Testing source Redis connection..."
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a "$(source-redis-key)" PING
                
                echo "Testing target Redis connection..."
                redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls -a "$(target-redis-key)" PING
                
                echo "Connection tests complete"
              '

