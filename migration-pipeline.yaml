name: Terraform Azure Redis Migration
trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"
  - name: sourceRedisHost
    type: string
    default: ""
  - name: targetRedisHost
    type: string
    default: ""
  - name: sourceRedisPort
    type: string
    default: "6380"
  - name: targetRedisPort
    type: string
    default: "10000"

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-24.04
  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"
  - name: aksResourceGroup
    value: "cft-sbox-00-rg"
  - group: redis-migration-secrets 

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: migrate_data
    displayName: 'Azure_Redis_Migration'
    dependsOn: Precheck
    jobs:
    - job: redis_migration
      displayName: 'Redis Migration'
      pool:
        vmImage: ${{ variables.agentImage }}
      timeoutInMinutes: ${{ variables.timeoutInMinutes }}
      steps:
      - task: AzureCLI@2
        displayName: Run Redis Migration
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            [ -z "${{ parameters.sourceRedisHost }}" ] && echo "##vso[task.logissue type=error]sourceRedisHost required" && exit 1
            [ -z "${{ parameters.targetRedisHost }}" ] && echo "##vso[task.logissue type=error]targetRedisHost required" && exit 1
            
            # Get AKS credentials
            az aks get-credentials --resource-group $(aksResourceGroup) --name ${{ parameters.aksClusterName }} --admin --overwrite-existing
            kubectl create namespace redis-migration 2>/dev/null || true
            
            # Run migration pod directly
            echo "Starting Redis migration..."
            kubectl run redis-migrate-$(date +%s) \
              --image=redis:7-alpine \
              --restart=Never \
              --namespace=redis-migration \
              --env="SRC=${SOURCE_REDIS_KEY}" \
              --env="TGT=${TARGET_REDIS_KEY}" \
              --command -- sh -c '
                echo "Testing connections..."
                redis-cli -h ${{ parameters.sourceRedisHost }} -p ${{ parameters.sourceRedisPort }} --tls -a "$SRC" PING || exit 1
                redis-cli -h ${{ parameters.targetRedisHost }} -p ${{ parameters.targetRedisPort }} --tls -a "$TGT" PING || exit 1
                
                echo "Migrating keys..."
                redis-cli -h ${{ parameters.sourceRedisHost }} -p ${{ parameters.sourceRedisPort }} --tls -a "$SRC" --scan | \
                while read key; do
                  TTL=$(redis-cli -h ${{ parameters.sourceRedisHost }} -p ${{ parameters.sourceRedisPort }} --tls -a "$SRC" PTTL "$key")
                  [ "$TTL" = "-1" ] && TTL=0
                  redis-cli -h ${{ parameters.sourceRedisHost }} -p ${{ parameters.sourceRedisPort }} --tls -a "$SRC" --raw DUMP "$key" | \
                  redis-cli -h ${{ parameters.targetRedisHost }} -p ${{ parameters.targetRedisPort }} --tls -a "$TGT" -x RESTORE "$key" "$TTL" REPLACE
                  echo "✓ $key"
                done
                
                echo "Verifying..."
                S=$(redis-cli -h ${{ parameters.sourceRedisHost }} -p ${{ parameters.sourceRedisPort }} --tls -a "$SRC" DBSIZE)
                T=$(redis-cli -h ${{ parameters.targetRedisHost }} -p ${{ parameters.targetRedisPort }} --tls -a "$TGT" DBSIZE)
                echo "Source: $S keys | Target: $T keys"
                [ "$S" = "$T" ] && echo "✓ Migration successful" || exit 1
              '
             
            # Verify completion
            kubectl wait --for=jsonpath='{.status.phase}'=Succeeded --timeout=30m pod/$POD -n redis-migration
            
            # Cleanup
            kubectl delete pod $POD -n redis-migration --ignore-not-found
            
            echo "Migration complete!"
        env:
          SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
          TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)