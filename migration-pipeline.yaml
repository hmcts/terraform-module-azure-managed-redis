name: Terraform Azure Redis Migration
trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"
  - name: sourceRedisHost
    type: string
    default: ""
  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-24.04
  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"
  - name: aksResourceGroup
    value: "cft-sbox-00-rg"
  - group: redis-migration-secrets 

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: migrate_data
    displayName: 'Azure_Redis_Migration'
    dependsOn: Precheck
    jobs:
    - job: redis_migration
      displayName: 'Redis Migration'
      pool:
        vmImage: ${{ variables.agentImage }}
      timeoutInMinutes: ${{ variables.timeoutInMinutes }}
      steps:
      - task: AzureCLI@2
        displayName: Get AKS Credentials
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Getting AKS credentials..."
            az aks get-credentials \
              --resource-group $(aksResourceGroup) \
              --name ${{ parameters.aksClusterName }} \
              --admin \
              --overwrite-existing
            
            echo "Verifying kubectl connection..."
            kubectl cluster-info

      - task: AzureCLI@2
        displayName: Test Redis Connections
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Creating namespace for Redis migration..."
            kubectl create namespace redis-migration || true
            
            JOB_NAME="redis-test-$(date +%s)"
            kubectl create job $JOB_NAME \
              --image=redis:7-alpine \
              --namespace=redis-migration \
              -- sh -c "
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a '${SOURCE_REDIS_KEY}' PING
                redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls -a '${TARGET_REDIS_KEY}' PING
              "
            kubectl wait --for=condition=complete --timeout=300s job/$JOB_NAME -n redis-migration
            kubectl logs -l job-name=$JOB_NAME -n redis-migration
        env:
          SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
          TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)

      - task: AzureCLI@2
        displayName: Migrate Redis Data
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            JOB_NAME="redis-migrate-$(date +%s)"
            
            kubectl create job $JOB_NAME \
              --image=redis:7-alpine \
              --namespace=redis-migration \
              -- sh -c '
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a "${SOURCE_REDIS_KEY}" \
                  --scan --pattern "*" | while read key; do
                    echo "Migrating: $key"
                    redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a "${SOURCE_REDIS_KEY}" \
                      DUMP "$key" | redis-cli -h ${{ parameters.targetRedisHost }} -a 10000 \
                      --tls -a "${TARGET_REDIS_KEY}" \
                      -x RESTORE "$key" 0 REPLACE
                  done
              '
            kubectl wait --for=condition=complete --timeout=1800s job/$JOB_NAME -n redis-migration
            kubectl logs -l job-name=$JOB_NAME -n redis-migration
            kubectl delete namespace redis-migration --ignore-not-found=true
        env:
          SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
          TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)