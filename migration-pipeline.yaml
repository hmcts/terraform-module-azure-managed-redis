name: Terraform Azure Redis Migration

trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"

  - name: sourceRedisHost
    type: string
    default: ""

  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries

  - name: timeoutInMinutes
    value: 90

  - name: agentImage
    value: ubuntu-24.04

  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"

  - name: aksResourceGroup
    value: "cft-sbox-00-rg"

  - group: redis-migration-secrets

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: migrate_data
    displayName: 'Redis Data Migration'
    dependsOn: Precheck
    jobs:
      - job: redis_migration
        displayName: 'Migrate Redis Keys'
        pool:
          vmImage: ${{ variables.agentImage }}
        timeoutInMinutes: ${{ variables.timeoutInMinutes }}
        steps:
          - task: AzureCLI@2
            displayName: Run Migration
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials --resource-group $(aksResourceGroup) --name ${{ parameters.aksClusterName }} --admin --overwrite-existing
                kubectl create namespace redis-migration 2>/dev/null || true

                echo "Testing connections..."
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a "$SOURCE_REDIS_KEY" PING || exit 1
                redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls -c -a "$TARGET_REDIS_KEY" PING || exit 1

                cat <<EOF | kubectl apply -f -
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: redis-migrate-$(date +%s)
                  namespace: redis-migration
                spec:
                  ttlSecondsAfterFinished: 600
                  template:
                    spec:
                      restartPolicy: Never
                      containers:
                      - name: migrate
                        image: redis:7-alpine
                        env:
                        - name: SRC
                          value: "$SOURCE_REDIS_KEY"
                        - name: TGT
                          value: "$TARGET_REDIS_KEY"
                        command: [sh, -c]
                        args:
                        - |
                          SRC="redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a \$SRC"
                          TGT="redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls -c -a \$TGT"
                          
                          \$SRC PING || exit 1
                          \$TGT PING || exit 1
                          
                          \$SRC --scan | while read key; do
                            ttl=\$(\$SRC PTTL "\$key")
                            val=\$(\$SRC GET "\$key")
                            \$TGT SET "\$key" "\$val"
                            [ "\$ttl" -gt 0 ] && \$TGT PEXPIRE "\$key" "\$ttl"
                            echo "✓ \$key"
                          done
                          
                          echo "Migrated: \$(\$TGT DBSIZE) keys"
                EOF

                kubectl wait --for=condition=complete --timeout=3600s job -l batch.kubernetes.io/job-name -n redis-migration
                kubectl logs -l batch.kubernetes.io/job-name -n redis-migration
                kubectl delete namespace redis-migration
            env:
              SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
              TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)
