name: Terraform Azure Redis Migration

trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"

  - name: sourceRedisHost
    type: string
    default: ""

  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries

  - name: timeoutInMinutes
    value: 90

  - name: agentImage
    value: ubuntu-24.04

  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"

  - name: aksResourceGroup
    value: "cft-sbox-00-rg"

  - group: redis-migration-secrets

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: migrate_data
    displayName: 'Redis Data Migration'
    dependsOn: Precheck
    jobs:
      - job: redis_migration
        displayName: 'Migrate Redis Keys'
        pool:
          vmImage: ${{ variables.agentImage }}
        timeoutInMinutes: ${{ variables.timeoutInMinutes }}
        steps:
          - task: AzureCLI@2
            displayName: Run Migration
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az aks get-credentials --resource-group $(aksResourceGroup) --name ${{ parameters.aksClusterName }} --admin --overwrite-existing
                kubectl create namespace redis-migration 2>/dev/null || true

                cat <<EOF | kubectl apply -f -
                apiVersion: batch/v1
                kind: Job
                metadata:
                  name: redis-migrate-$(date +%s)
                  namespace: redis-migration
                spec:
                  ttlSecondsAfterFinished: 600
                  template:
                    spec:
                      restartPolicy: Never
                      containers:
                      - name: migrate
                        image: redis:7-alpine
                        env:
                        - name: SRC
                          value: "$SOURCE_REDIS_KEY"
                        - name: TGT
                          value: "$TARGET_REDIS_KEY"
                        command: [sh, -c]
                        args:
                        - |
                          SRC="redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a \$SRC"
                          TGT="redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls -c -a \$TGT"
                          
                          \$SRC PING 2>/dev/null || exit 1
                          \$TGT PING 2>/dev/null || exit 1
                          
                          echo "Ensuring all source keys have no expiry..."
                          for key in \$(\$SRC KEYS "*" 2>/dev/null); do
                            \$SRC PERSIST "\$key" >/dev/null 2>&1
                          done
                          
                          echo "Flushing target Redis..."
                          \$TGT FLUSHALL
                          
                          echo ""
                          echo "Source keys before migration:"
                          \$SRC KEYS "*"
                          echo ""
                          
                          echo "Starting migration..."
                          count=0
                          for key in \$(\$SRC KEYS "*" 2>/dev/null); do
                            ttl=\$(\$SRC PTTL "\$key" 2>/dev/null)
                            val=\$(\$SRC GET "\$key" 2>/dev/null)
                            \$TGT SET "\$key" "\$val" >/dev/null 2>&1
                            
                            if [ "\$ttl" -gt 0 ]; then
                              \$TGT PEXPIRE "\$key" "\$ttl" >/dev/null 2>&1
                              count=\$((count + 1))
                              echo "\$count. ✓ \$key (TTL: \$ttl ms)"
                            else
                              count=\$((count + 1))
                              echo "\$count. ✓ \$key (no expiry)"
                            fi
                          done
                          
                          echo ""
                          echo "Migration complete! Migrated \$count keys"
                          echo ""
                          echo "Verifying all keys in target:"
                          verified=0
                          for key in \$(\$SRC KEYS "*" 2>/dev/null); do
                            val=\$(\$TGT GET "\$key" 2>/dev/null)
                            if [ -n "\$val" ]; then
                              echo "  ✓ \$key exists"
                              verified=\$((verified + 1))
                            else
                              echo "  ✗ \$key MISSING"
                            fi
                          done
                          
                          echo ""
                          echo "Summary: \$verified/\$count keys verified in target"
                          
                          echo ""
                          echo "All keys in target (across all cluster shards):"
                          for key in \$(\$SRC KEYS "*" 2>/dev/null); do
                            echo "  - \$key"
                          done
                EOF

                kubectl wait --for=condition=complete --timeout=3600s job -l batch.kubernetes.io/job-name -n redis-migration
                kubectl logs -l batch.kubernetes.io/job-name -n redis-migration
                kubectl delete namespace redis-migration
            env:
              SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
              TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)
