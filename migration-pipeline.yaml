name: Terraform Azure Redis Migration
trigger:
  batch: true
  branches:
    include:
      - main

pr:
  - main

resources:
  repositories:
    - repository: cnp-azuredevops-libraries
      type: github
      ref: refs/heads/master
      name: hmcts/cnp-azuredevops-libraries
      endpoint: "hmcts"

parameters:
  - name: aksClusterName
    type: string
    default: "cft-sbox-00-aks"
  - name: sourceRedisHost
    type: string
    default: ""
  - name: targetRedisHost
    type: string
    default: ""

variables:
  - template: vars/input-variables.yaml@cnp-azuredevops-libraries
  - name: timeoutInMinutes
    value: 60
  - name: agentImage
    value: ubuntu-24.04
  - name: serviceConnection
    value: "DCD-CFTAPPS-SBOX"
  - name: aksResourceGroup
    value: "cft-sbox-00-rg"
  - group: redis-migration-secrets 

stages:
  - stage: Precheck
    jobs:
      - job: PrecheckJob
        pool:
          vmImage: ${{ variables.agentImage }}
        steps:
          - template: steps/terraform-precheck.yaml@cnp-azuredevops-libraries
            parameters:
              keyvaultName: "infra-vault-nonprod"
              keyvaultSecret: "azure-devops-sp-token"
              serviceConnection: "azurerm-sandbox"
              overrideAction: "plan"
              forcePreventParallelJobRun: true

  - stage: check_connection
    pool:
      vmImage: ${{ variables.agentImage }}
    jobs:
    - job: redis_migration
      displayName: 'Migrate Redis Data to Azure Managed Redis'
      timeoutInMinutes: ${{ variables.timeoutInMinutes }}
      steps:
      - task: AzureCLI@2
        displayName: Get AKS Credentials
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            echo "Getting AKS credentials..."
            az aks get-credentials \
              --resource-group $(aksResourceGroup) \
              --name ${{ parameters.aksClusterName }} \
              --admin \
              --overwrite-existing
            
            echo "Verifying kubectl connection..."
            kubectl cluster-info

      - task: AzureCLI@2
        displayName: Run Redis Migration in Pod
        inputs:
          azureSubscription: $(serviceConnection)
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            kubectl create namespace redis-migration || true
            
            echo "Creating Kubernetes Job for Redis connectivity test..."
            JOB_NAME="redis-test-$(date +%s)"
            
            kubectl create job $JOB_NAME \
              --image=redis:7-alpine \
              --namespace=redis-migration \
              -- sh -c "
                echo 'Testing source Redis connection...'
                redis-cli -h ${{ parameters.sourceRedisHost }} -p 6380 --tls -a '${SOURCE_REDIS_KEY}' PING
                
                echo 'Testing target Redis connection...'
                redis-cli -h ${{ parameters.targetRedisHost }} -p 10000 --tls --user default -a '${TARGET_REDIS_KEY}' PING
                
                echo 'Connection tests complete' "
            
            kubectl wait --for=condition=complete --timeout=300s job/$JOB_NAME -n redis-migration || true
            
            echo "Job logs:"
            POD_NAME=$(kubectl get pods -n redis-migration -l job-name=$JOB_NAME -o jsonpath='{.items[0].metadata.name}')
            kubectl logs $POD_NAME -n redis-migration
            
            kubectl delete namespace redis-migration --ignore-not-found=true
        env:
          SOURCE_REDIS_KEY: $(SOURCE_REDIS_KEY)
          TARGET_REDIS_KEY: $(TARGET_REDIS_KEY)